<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

    <div th:fragment="modalFragments">

        <!-- =========================== -->
        <!--  TOAST NOTIFICATION (NEW)   -->
        <!-- =========================== -->
        <div id="toastNotification">
        </div>



        <!-- =========================== -->
        <!--       UNIVERSAL MODAL       -->
        <!-- =========================== -->
        <div id="universalModal">
            <!-- Inner content container -->
            <div id="modalContentContainer">
                <!-- Close Button -->
                <span id="closeUniversalModal" onclick="closeModal()">&times;</span>
                <!-- Content injected here -->
                <div id="injectedContent"></div>
            </div>
        </div>




        <!------------------------------------------------------ FILE MODALS------------------------------------------------------------->
        <template id="backupTemplate">
            <form id="createBackupForm" th:action="@{/create-backup}" method="POST" style="display:inline;"
                onsubmit="registerPendingAction('backupCreated')">
                <h3 class="modal-text">Name your backup-file</h3>
                <div class="sidenote">(Any existing file with the same name will be replaced)</div>
                <br>
                <div class="modal-content-div">
                    <input type="text" placeholder="filename" name="name" required style="padding: 5px;">
                </div>
                <hr>
                <div class="modal-content-div">
                    <input class="btn" type="submit" value="Create Backup">
                    <a class="btn" href="#" onclick="closeModal()">Close</a>
                </div>
            </form>
        </template>

        <template id="saveTemplate">
            <div style="text-align: center;">
                <h3>Save Changes?</h3>
                <p>This will override the existing <b>Base.ruleset</b> file,<br>
                    even if you are currently working on a backup-file.</p>
                <br>
                <form th:action="@{/save}" method="POST" style="display:inline;"
                    onsubmit="registerPendingAction('rulesetSaved')">
                    <button class="btn" type="submit">Save</button>
                </form>
                <a class="btn" href="#" onclick="closeModal()">Close</a>
            </div>
        </template>

        <!------------------------------------------------------ CHARACTER MODALS ------------------------------------------------------------->
        <template id="maxHpTemplate">
            <div style="text-align: center;">
                <h2>Are you sure?</h2>
                <span>This will set all characters HP to 99</span><br><br>
                <form th:action="@{/maxhp}" method="POST" style="display:inline;"
                    onsubmit="registerPendingAction('hpMaxed')">
                    <button class="btn" type="submit" onclick="closeModal()">I am sure</button>
                </form>
                <a class="btn" href="#" onclick="closeModal()">Nevermind</a>
            </div>
        </template>

        <template id="maxCardsTemplate">
            <div style="text-align: center;">
                <h2>Are you sure?</h2>
                <span>
                    This will set all characters max ability cards
                    <br>
                    in battle to their maximum safe value.
                    <br>
                    See individual character pages for details.
                </span><br><br>
                <form th:action="@{/maxcards}" method="POST" style="display:inline;"
                    onsubmit="registerPendingAction('cardsMaxed')">
                    <button class="btn" type="submit" onclick="closeModal()">I am
                        sure</button>
                </form>
                <a class="btn" href="#" onclick="closeModal()">Nevermind</a>
            </div>
        </template>


        <!------------------------------------------------------ ENABLE STARTERS ------------------------------------------------------------->

        <template id="enableAllTemplate">
            <i>*not all characters can be enabled safely yet</i><br>
            <b>Make the following characters available from start:</b>
            <div style="text-align: left; width: 400px; margin: 0 auto;">
                <ul>
                    <li>Pyroclast</li>
                    <li>Snowdancer</li>
                    <li>Frozen Fist</li>
                    <li>Trapper</li>
                    <li>Hive</li>
                    <li>Infuser</li>
                    <li>Metal Mosaic</li>
                    <li>Pain Conduit</li>
                </ul>
            </div>

            <span style="color: red; font-size: 14px;"><b>Warning</b><br>This is experimental and not extensively
                tested.
                Enabling new starting characters may cause the game to behave in unexpected ways, or lock you out of
                quests
                in the game. Use at your own discretion.</span><br><br>
            <form th:action="@{/enablecharacters}" method="POST" style="display:inline;"
                onsubmit="registerPendingAction('charactersEnabled')">
                <button class="warning-btn btn" type="submit" onclick="closeModal()">I understand</button>
            </form>
            <a class="btn" href="#" onclick="closeModal()">Nevermind</a>
        </template>


        <!------------------------------------------------------ SIZE MISMATCH WARNING ------------------------------------------------------------->
        <template id="sizeMismatchTemplate">
            <div style="text-align: center;">
                <h2 style="color: red;">Ruleset size mismatch</h2>
                <p>
                    The file you opened is a different size than your original backup.<br>
                    The program can't tell why, so you need to check it yourself:
                </p>
                <p><b>Close this program and launch Frosthaven.</b></p>
                <div style="text-align: left; width: 460px; margin: 0 auto;">
                    <ul>
                        <li style="margin-bottom: 10px;">
                            <b>The game starts normally</b> &rarr; it was patched. The opened file is fine; your
                            backup is just outdated and should be replaced with a fresh one.
                        </li>
                        <li>
                            <b>The game won't load or behaves wrong</b> &rarr; the file is corrupted. Restore it
                            from your backup.
                        </li>
                    </ul>
                </div>
                <div class="sidenote">(If patched: do this right after patching, before making any changes, so the new backup stays clean.)</div>
                <br>
                <form th:action="@{/restore-backup}" method="POST" style="display:inline;"
                    onsubmit="registerPendingAction('backupRestored')">
                    <button class="btn" type="submit">The game is broken — restore from the old backup</button>
                </form>
                <form th:action="@{/replace-backup}" method="POST" style="display:inline;"
                    onsubmit="registerPendingAction('backupReplaced')">
                    <button class="warning-btn btn" type="submit">The game started — create a new backup from this file</button>
                </form>
                <br><br>
                <div class="sidenote">
                    Both files unusable? See
                    <a th:href="@{/troubleshooting}" target="contentFrame" onclick="closeModal()">Troubleshooting</a>.
                </div>
            </div>
        </template>


    </div>
</body>

</html>
